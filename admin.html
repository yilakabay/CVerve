<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVerve Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-[Inter] min-h-screen flex items-center justify-center p-4">

<!-- Toast -->
<div id="toast" class="hidden fixed top-4 inset-x-0 flex justify-center z-50">
  <div id="toastInner" class="px-6 py-3 rounded-xl shadow-lg text-white font-semibold max-w-sm text-center"></div>
</div>

<!-- Loading -->
<div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-40">
  <div class="bg-white rounded-xl p-8 text-center shadow-xl">
    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <p class="font-semibold text-gray-700">Processing…</p>
  </div>
</div>

<div class="w-full max-w-lg">

  <!-- Auth panel -->
  <div id="authPanel" class="bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-indigo-600 text-center mb-1">CVerve Admin</h1>
    <p id="authSubtitle" class="text-sm text-center text-gray-500 mb-6">Payment Verification</p>

    <!-- Login form -->
    <div id="loginForm">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Admin Password</label>
        <input type="password" id="loginPassword" placeholder="Enter admin password"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button onclick="doLogin()"
        class="w-full bg-indigo-500 text-white py-2 px-4 rounded-full font-semibold hover:bg-indigo-600 transition-colors shadow-md">
        Login
      </button>
    </div>

    <!-- Register form (shown only when no admin exists) -->
    <div id="registerForm" class="hidden">
      <p class="text-sm text-amber-700 bg-amber-50 rounded-lg p-3 mb-4">
        No admin account exists yet. You are the first visitor — set your admin password now.
      </p>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password (min. 6 characters)"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Confirm your password"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button onclick="doRegister()"
        class="w-full bg-emerald-500 text-white py-2 px-4 rounded-full font-semibold hover:bg-emerald-600 transition-colors shadow-md">
        Create Admin Account
      </button>
    </div>
  </div>

  <!-- Verification panel (shown after login) -->
  <div id="verifyPanel" class="hidden bg-white rounded-2xl shadow-lg p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-bold text-indigo-600">Admin Dashboard</h1>
      <button onclick="doLogout()" class="text-sm text-gray-500 hover:text-red-500 transition-colors">Logout</button>
    </div>

    <!-- Pending payments list -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-gray-700">Pending Payments</h2>
        <button onclick="loadPending()" class="text-sm text-indigo-600 hover:underline">↻ Refresh</button>
      </div>
      <div id="pendingList" class="space-y-2 max-h-72 overflow-y-auto">
        <p class="text-sm text-gray-400 italic">Loading…</p>
      </div>
    </div>

    <!-- Manual verification -->
    <div class="border-t border-gray-200 pt-6">
      <h2 class="font-semibold text-gray-700 mb-2">Verify Payments</h2>
      <p class="text-xs text-gray-500 mb-3">
        Paste one payment per line: <code class="bg-gray-100 px-1 rounded">PAYMENT_ID AMOUNT</code> or
        <code class="bg-gray-100 px-1 rounded">PAYMENT_ID,AMOUNT</code><br>
        Example: <code class="bg-gray-100 px-1 rounded">FT1234567890 500</code>
      </p>
      <textarea id="verifyInput" rows="6" placeholder="FT1234567890 500&#10;FT0987654321,250"
        class="w-full p-3 rounded-lg border border-gray-300 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none mb-3"></textarea>
      <button onclick="doVerify()"
        class="w-full bg-indigo-500 text-white py-2 px-4 rounded-full font-semibold hover:bg-indigo-600 transition-colors shadow-md">
        Verify Payments
      </button>
    </div>

    <!-- Results -->
    <div id="verifyResults" class="hidden mt-6 border-t border-gray-200 pt-4">
      <h3 class="font-semibold text-gray-700 mb-2">Results</h3>
      <div id="verifyResultsBody" class="space-y-2 text-sm"></div>
    </div>
  </div>

</div>

<script>
  let adminToken = sessionStorage.getItem('cverve_admin_token') || null;

  // ── Utilities ────────────────────────────────────────────────────────────

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const i = document.getElementById('toastInner');
    i.textContent = msg;
    i.className = `px-6 py-3 rounded-xl shadow-lg text-white font-semibold max-w-sm text-center ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3500);
  }

  function setLoading(on) {
    document.getElementById('loading').classList.toggle('hidden', !on);
  }

  async function api(path, data) {
    const res = await fetch(`/.netlify/functions/${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  }

  // ── Startup ──────────────────────────────────────────────────────────────

  async function init() {
    if (adminToken) { showVerifyPanel(); return; }
    setLoading(true);
    try {
      const { data } = await api('admin-auth', { action: 'check' });
      if (data.hasAdmin) {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
      } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
      }
    } catch {
      showToast('Could not reach server. Please refresh.', 'error');
    } finally {
      setLoading(false);
    }
  }

  // ── Auth ─────────────────────────────────────────────────────────────────

  async function doLogin() {
    const password = document.getElementById('loginPassword').value;
    if (!password) { showToast('Please enter your password', 'error'); return; }
    setLoading(true);
    try {
      const { ok, data } = await api('admin-auth', { action: 'login', password });
      if (ok && data.token) {
        adminToken = data.token;
        sessionStorage.setItem('cverve_admin_token', adminToken);
        showVerifyPanel();
      } else {
        showToast(data.error || 'Login failed', 'error');
      }
    } catch {
      showToast('Login failed. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  }

  async function doRegister() {
    const password        = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirm').value;
    if (!password)                    { showToast('Please enter a password', 'error'); return; }
    if (password !== confirmPassword) { showToast('Passwords do not match', 'error'); return; }
    if (password.length < 6)          { showToast('Password must be at least 6 characters', 'error'); return; }
    setLoading(true);
    try {
      const { ok, data } = await api('admin-auth', { action: 'register', password, confirmPassword });
      if (ok && data.token) {
        adminToken = data.token;
        sessionStorage.setItem('cverve_admin_token', adminToken);
        showVerifyPanel();
      } else {
        showToast(data.error || 'Registration failed', 'error');
      }
    } catch {
      showToast('Registration failed. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  }

  function doLogout() {
    adminToken = null;
    sessionStorage.removeItem('cverve_admin_token');
    document.getElementById('verifyPanel').classList.add('hidden');
    document.getElementById('authPanel').classList.remove('hidden');
    init();
  }

  // ── Verify Panel ─────────────────────────────────────────────────────────

  function showVerifyPanel() {
    document.getElementById('authPanel').classList.add('hidden');
    document.getElementById('verifyPanel').classList.remove('hidden');
    loadPending();
  }

  async function loadPending() {
    const container = document.getElementById('pendingList');
    container.innerHTML = '<p class="text-sm text-gray-400 italic">Loading…</p>';
    try {
      const { ok, data } = await api('admin-verify', { token: adminToken, action: 'list' });
      if (!ok) {
        if (data.error && data.error.includes('Unauthorized')) { doLogout(); return; }
        container.innerHTML = `<p class="text-sm text-red-500">${data.error}</p>`;
        return;
      }
      const list = data.pending || [];
      if (list.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-400 italic">No pending payments.</p>';
        return;
      }
      container.innerHTML = list.map(p => `
        <div class="flex items-start justify-between bg-gray-50 rounded-lg p-3 border border-gray-200">
          <div class="flex-1 min-w-0">
            <p class="font-mono text-xs text-indigo-700 font-semibold truncate">${p.paymentId}</p>
            <p class="text-xs text-gray-600">User: ${p.userId} · <span class="font-semibold">${p.amount} ETB</span> · ${p.paymentMethod || '–'}</p>
            <p class="text-xs text-gray-400">${new Date(p.submittedAt).toLocaleString()}</p>
          </div>
          <button onclick="quickFill('${p.paymentId}', ${p.amount})"
            class="ml-2 text-xs bg-indigo-100 text-indigo-700 rounded-lg px-2 py-1 hover:bg-indigo-200 transition flex-shrink-0">
            Fill
          </button>
        </div>
      `).join('');
    } catch {
      container.innerHTML = '<p class="text-sm text-red-500">Failed to load pending payments.</p>';
    }
  }

  function quickFill(paymentId, amount) {
    const ta = document.getElementById('verifyInput');
    const existing = ta.value.trim();
    const line = `${paymentId} ${amount}`;
    ta.value = existing ? existing + '\n' + line : line;
  }

  async function doVerify() {
    const raw = document.getElementById('verifyInput').value.trim();
    if (!raw) { showToast('Please paste at least one payment entry', 'error'); return; }

    // Parse lines: "FT123 500" or "FT123,500"
    const entries = [];
    for (const line of raw.split('\n')) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      const parts = trimmed.includes(',') ? trimmed.split(',') : trimmed.split(/\s+/);
      if (parts.length < 2) { showToast(`Could not parse line: "${trimmed}"`, 'error'); return; }
      entries.push({ paymentId: parts[0].trim(), amount: parts[1].trim() });
    }

    if (entries.length === 0) { showToast('No valid entries found', 'error'); return; }

    setLoading(true);
    try {
      const { ok, data } = await api('admin-verify', { token: adminToken, action: 'verify', entries });
      if (!ok) {
        if (data.error && data.error.includes('Unauthorized')) { doLogout(); return; }
        showToast(data.error || 'Verification failed', 'error');
        return;
      }

      // Show results
      const results = data.results || [];
      const resultsDiv = document.getElementById('verifyResults');
      const body       = document.getElementById('verifyResultsBody');

      const statusStyles = {
        verified:        'bg-emerald-50 border-emerald-200 text-emerald-800',
        not_found:       'bg-red-50 border-red-200 text-red-800',
        amount_mismatch: 'bg-amber-50 border-amber-200 text-amber-800',
        skipped:         'bg-gray-50 border-gray-200 text-gray-600',
      };

      body.innerHTML = results.map(r => `
        <div class="rounded-lg border p-3 ${statusStyles[r.status] || statusStyles.skipped}">
          <span class="font-mono font-semibold">${r.paymentId || '–'}</span>
          <span class="ml-2 font-semibold capitalize">${r.status.replace('_', ' ')}</span>
          ${r.amount  ? `<span class="ml-1 text-xs">(${r.amount} ETB → ${r.userId})</span>` : ''}
          ${r.reason  ? `<p class="text-xs mt-1 opacity-80">${r.reason}</p>` : ''}
        </div>
      `).join('');

      resultsDiv.classList.remove('hidden');

      const v = data.verifiedCount || 0;
      showToast(`${v} payment${v !== 1 ? 's' : ''} verified successfully.`, v > 0 ? 'success' : 'error');

      if (v > 0) {
        document.getElementById('verifyInput').value = '';
        loadPending();
      }
    } catch {
      showToast('Verification request failed. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
