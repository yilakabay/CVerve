<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f7f9;
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .input-section {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .preview-section {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #pdfPreview {
            border: 1px solid #ddd;
            padding: 20px;
            min-height: 400px;
            background: white;
        }
        .preview-header {
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .preview-content {
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .download-btn {
            background-color: #27ae60;
        }
        .download-btn:hover {
            background-color: #219653;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>HTML to PDF Converter</h1>
    
    <div class="container">
        <div class="input-section">
            <h2>Enter Details</h2>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="Document title">
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Your email">
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" placeholder="Enter your content here..."></textarea>
            </div>
            <div class="form-group">
                <label for="template">Template Style</label>
                <select id="template">
                    <option value="professional">Professional</option>
                    <option value="casual">Casual</option>
                    <option value="minimal">Minimal</option>
                </select>
            </div>
            <button id="generateBtn">Generate PDF Preview</button>
        </div>
        
        <div class="preview-section">
            <h2>PDF Preview</h2>
            <div id="pdfPreview">
                <p>Your PDF preview will appear here after generating.</p>
            </div>
            <div class="actions">
                <button id="downloadBtn" class="download-btn">Download PDF</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', generatePreview);
        document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
        
        function generatePreview() {
            const title = document.getElementById('title').value || 'Untitled Document';
            const name = document.getElementById('name').value || '';
            const email = document.getElementById('email').value || '';
            const content = document.getElementById('content').value || '';
            const template = document.getElementById('template').value;
            
            let htmlContent = '';
            
            // Apply different templates
            if (template === 'professional') {
                htmlContent = `
                    <div class="preview-header">
                        <h1 style="color: #2c3e50; margin-bottom: 5px;">${title}</h1>
                        <p style="color: #7f8c8d;">Generated on ${new Date().toLocaleDateString()}</p>
                    </div>
                    <div class="preview-content">
                        ${name ? `<p><strong>Name:</strong> ${name}</p>` : ''}
                        ${email ? `<p><strong>Email:</strong> ${email}</p>` : ''}
                        <div style="margin-top: 20px;">${content.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div style="margin-top: 30px; font-size: 12px; color: #95a5a6; text-align: center;">
                        <hr>
                        <p>Document generated by HTML to PDF Converter</p>
                    </div>
                `;
            } else if (template === 'casual') {
                htmlContent = `
                    <div style="text-align: center; border-bottom: 2px dashed #3498db; padding-bottom: 15px; margin-bottom: 20px;">
                        <h1 style="color: #e74c3c; margin-bottom: 10px;">${title}</h1>
                        <p style="color: #3498db;"><em>Created by ${name || 'Unknown'} on ${new Date().toLocaleDateString()}</em></p>
                    </div>
                    <div style="line-height: 1.8; font-size: 16px;">
                        <div>${content.replace(/\n/g, '<br>')}</div>
                    </div>
                    ${email ? `<div style="margin-top: 30px;"><strong>Contact:</strong> ${email}</div>` : ''}
                `;
            } else { // minimal
                htmlContent = `
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h2 style="font-weight: 300; letter-spacing: 2px;">${title}</h2>
                    </div>
                    <div style="line-height: 1.6;">
                        ${name ? `<p><strong>FROM:</strong> ${name}</p>` : ''}
                        ${email ? `<p><strong>EMAIL:</strong> ${email}</p>` : ''}
                        <div style="margin-top: 40px;">${content.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div style="margin-top: 50px; font-size: 11px; color: #bdc3c7; text-align: right;">
                        <p>Generated on ${new Date().toLocaleDateString()}</p>
                    </div>
                `;
            }
            
            document.getElementById('pdfPreview').innerHTML = htmlContent;
        }
        
        function downloadPDF() {
            const element = document.getElementById('pdfPreview');
            
            // Set PDF options
            const options = {
                margin: 10,
                filename: 'document.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Generate and download PDF
            html2pdf().set(options).from(element).save();
        }
    </script>
</body>
</html>
