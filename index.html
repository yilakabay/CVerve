        // Profile storage related
        let storedProfile = null;
        let usingStoredCv = false;
        let storedCvText = null;
        let storedCvFilename = null;

        // ── IndexedDB for persisting CV PDF binary ────────────────────────────
        const CV_DB_NAME = 'cverve_cv_store';
        const CV_STORE   = 'cv_pdfs';

        function openCvDb() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(CV_DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(CV_STORE);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }

        async function saveCvPdfToDb(uid, arrayBuffer, filename) {
            try {
                const db = await openCvDb();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(CV_STORE, 'readwrite');
                    tx.objectStore(CV_STORE).put({ data: arrayBuffer, filename }, uid);
                    tx.oncomplete = resolve;
                    tx.onerror    = e => reject(e.target.error);
                });
            } catch(e) { console.error('saveCvPdfToDb error', e); }
        }

        async function loadCvPdfFromDb(uid) {
            try {
                const db = await openCvDb();
                return new Promise((resolve, reject) => {
                    const tx  = db.transaction(CV_STORE, 'readonly');
                    const req = tx.objectStore(CV_STORE).get(uid);
                    req.onsuccess = e => resolve(e.target.result || null);
                    req.onerror   = e => reject(e.target.error);
                });
            } catch(e) { console.error('loadCvPdfFromDb error', e); return null; }
        }

        async function deleteCvPdfFromDb(uid) {

                    tx.onerror    = e => reject(e.target.error);

        // Profile storage related
        let storedProfile = null;
        let usingStoredCv = false;
        let storedCvText = null;
        let storedCvFilename = null;

        // ── MongoDB CV PDF helpers (replaces IndexedDB) ───────────────────────
        const CV_MAX_MB = 2;
        const CV_MAX_BYTES = CV_MAX_MB * 1024 * 1024;

        /** Convert ArrayBuffer → base64 string */
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        /** Convert base64 string → ArrayBuffer */
        function base64ToArrayBuffer(b64) {
            const binary = atob(b64);
            const bytes  = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        /**
         * Send a CV PDF to MongoDB via manage-profile.
         * Returns { success, tooLarge, notPdf } flags.
         */
        async function saveCvPdfToServer(uid, arrayBuffer, filename) {
            if (arrayBuffer.byteLength > CV_MAX_BYTES) {
                return { success: false, tooLarge: true };
            }
            const base64 = arrayBufferToBase64(arrayBuffer);
            // Quick client-side PDF magic-byte check (base64 of "%PDF-" starts with "JVBERi0")
            if (!base64.startsWith('JVBERi0')) {
                return { success: false, notPdf: true };
            }
            // We send cvPdfBase64 as part of the profile save — caller must include full profile fields.
            // This helper just stores the buffer for later; actual save happens in updateProfileWithCurrentData.
            return { success: true, base64, filename };
        }

        /** Fetch the stored CV PDF from MongoDB. Returns ArrayBuffer or null. */
        async function loadCvPdfFromServer(uid) {
            try {
                const res = await fetch('/.netlify/functions/manage-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, action: 'get-cv-pdf' })
                });
                if (!res.ok) return null;
                const data = await res.json();
                if (!data.cvPdfBase64) return null;
                return base64ToArrayBuffer(data.cvPdfBase64);
            } catch(e) { console.error('loadCvPdfFromServer error', e); return null; }
        }
        // ─────────────────────────────────────────────────────────────────────

**REPLACE WITH:**

```js
        function handleCvFileSelect(e) {
            const newFiles = Array.from(e.target.files);
            e.target.value = '';

            const rejected = [];
            const accepted = [];

            for (const f of newFiles) {
                if (f.type !== 'application/pdf') {
                    rejected.push(`"${f.name}" is not a PDF and was skipped.`);
                    continue;
                }
                if (f.size > CV_MAX_BYTES) {
                    rejected.push(`"${f.name}" exceeds ${CV_MAX_MB} MB and was not added.`);
                    continue;
                }
                accepted.push(f);
            }

            if (rejected.length > 0) {
                showMessage('error', rejected.join(' '));
            }

            cvFilesArray = [...cvFilesArray, ...accepted];
            updateCvFilesList();

            if (cvFilesArray.length > 0) {
                usingStoredCv = false;
                document.getElementById('cvStoredBadgeContainer')?.classList.add('hidden');
                document.getElementById('cvFileInputContainer')?.classList.remove('hidden');
            }
        }
```

                profileData.cvFilename  = window._stagedCvPdf.filename || profileData.cvFilename;
